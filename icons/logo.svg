<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Main gradient: deep space -->
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#0d2a4a"/>
      <stop offset="100%" stop-color="#050a14"/>
    </radialGradient>
    <!-- Cyan glow gradient -->
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>
    <!-- Eye gradient -->
    <radialGradient id="eyeGrad" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#7bfcff"/>
      <stop offset="50%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#0069a0"/>
    </radialGradient>
    <!-- Purple accent gradient -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="50%" stop-color="#7b2fff"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
    <!-- Face panel gradient -->
    <linearGradient id="faceGrad" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#0d2a4a"/>
      <stop offset="100%" stop-color="#061525"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="strongGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Clip for rounded square -->
    <clipPath id="appClip">
      <rect x="0" y="0" width="512" height="512" rx="110" ry="110"/>
    </clipPath>
  </defs>

  <!-- App icon background -->
  <g clip-path="url(#appClip)">
    <!-- Deep background -->
    <rect width="512" height="512" fill="#050a14"/>
    <!-- Radial bg glow -->
    <rect width="512" height="512" fill="url(#bgGrad)"/>
    <!-- Grid lines -->
    <g opacity="0.06" stroke="#00d4ff" stroke-width="1">
      <line x1="64" y1="0" x2="64" y2="512"/>
      <line x1="128" y1="0" x2="128" y2="512"/>
      <line x1="192" y1="0" x2="192" y2="512"/>
      <line x1="256" y1="0" x2="256" y2="512"/>
      <line x1="320" y1="0" x2="320" y2="512"/>
      <line x1="384" y1="0" x2="384" y2="512"/>
      <line x1="448" y1="0" x2="448" y2="512"/>
      <line x1="0" y1="64" x2="512" y2="64"/>
      <line x1="0" y1="128" x2="512" y2="128"/>
      <line x1="0" y1="192" x2="512" y2="192"/>
      <line x1="0" y1="256" x2="512" y2="256"/>
      <line x1="0" y1="320" x2="512" y2="320"/>
      <line x1="0" y1="384" x2="512" y2="384"/>
      <line x1="0" y1="448" x2="512" y2="448"/>
    </g>
    <!-- Ambient glow center -->
    <ellipse cx="256" cy="230" rx="200" ry="180" fill="url(#coreGlow)"/>

    <!-- ── OUTER RING ── -->
    <!-- Outer dashed orbit ring -->
    <circle cx="256" cy="230" r="195" fill="none" stroke="url(#ringGrad)" stroke-width="1.5" stroke-dasharray="12 8" opacity="0.4"/>
    <!-- Inner orbit ring -->
    <circle cx="256" cy="230" r="175" fill="none" stroke="#00d4ff" stroke-width="0.8" opacity="0.2"/>

    <!-- ── FACE HEXAGON BASE ── -->
    <!-- Outer glow of face -->
    <circle cx="256" cy="228" r="148" fill="#00d4ff" opacity="0.04" filter="url(#strongGlow)"/>
    <!-- Face circle main -->
    <circle cx="256" cy="228" r="145" fill="url(#faceGrad)" stroke="url(#ringGrad)" stroke-width="2.5"/>
    <!-- Inner face highlight -->
    <circle cx="256" cy="228" r="143" fill="none" stroke="rgba(0,212,255,0.15)" stroke-width="1"/>

    <!-- ── SCAN LINE ── -->
    <rect x="111" y="215" width="290" height="2" fill="rgba(0,212,255,0.06)" rx="1"/>
    <rect x="111" y="230" width="290" height="1" fill="rgba(0,212,255,0.04)" rx="1"/>

    <!-- ── CIRCUIT DECORATIONS (top) ── -->
    <g stroke="#00d4ff" stroke-width="1.5" fill="none" opacity="0.5" filter="url(#softGlow)">
      <!-- Top left circuit -->
      <polyline points="160,130 145,130 140,125 125,125"/>
      <circle cx="125" cy="125" r="3" fill="#00d4ff"/>
      <polyline points="160,140 148,140 143,135"/>
      <!-- Top right circuit -->
      <polyline points="352,130 367,130 372,125 387,125"/>
      <circle cx="387" cy="125" r="3" fill="#00d4ff"/>
      <polyline points="352,140 364,140 369,135"/>
    </g>
    <!-- Top center antenna dots -->
    <g opacity="0.6" filter="url(#softGlow)">
      <circle cx="256" cy="112" r="4" fill="#7b2fff"/>
      <line x1="256" y1="116" x2="256" y2="132" stroke="#7b2fff" stroke-width="1.5"/>
      <circle cx="234" cy="108" r="2.5" fill="#00d4ff"/>
      <line x1="234" y1="111" x2="234" y2="130" stroke="#00d4ff" stroke-width="1"/>
      <circle cx="278" cy="108" r="2.5" fill="#00d4ff"/>
      <line x1="278" y1="111" x2="278" y2="130" stroke="#00d4ff" stroke-width="1"/>
    </g>

    <!-- ── EYES ── -->
    <!-- Left eye socket -->
    <ellipse cx="200" cy="210" rx="38" ry="40" fill="#050d1a" stroke="rgba(0,212,255,0.3)" stroke-width="1.5"/>
    <!-- Left eye glow bg -->
    <ellipse cx="200" cy="210" rx="32" ry="34" fill="#00d4ff" opacity="0.08" filter="url(#strongGlow)"/>
    <!-- Left eye iris -->
    <circle cx="200" cy="210" r="26" fill="url(#eyeGrad)" filter="url(#softGlow)"/>
    <!-- Left eye inner ring -->
    <circle cx="200" cy="210" r="20" fill="none" stroke="rgba(0,212,255,0.4)" stroke-width="1"/>
    <circle cx="200" cy="210" r="14" fill="#050d1a"/>
    <!-- Left pupil glow -->
    <circle cx="200" cy="210" r="10" fill="#00d4ff" opacity="0.15"/>
    <circle cx="200" cy="210" r="6" fill="#00d4ff" opacity="0.4"/>
    <!-- Left eye catchlight -->
    <circle cx="192" cy="202" r="5" fill="white" opacity="0.75"/>
    <circle cx="207" cy="218" r="2.5" fill="white" opacity="0.25"/>

    <!-- Right eye socket -->
    <ellipse cx="312" cy="210" rx="38" ry="40" fill="#050d1a" stroke="rgba(0,212,255,0.3)" stroke-width="1.5"/>
    <!-- Right eye glow bg -->
    <ellipse cx="312" cy="210" rx="32" ry="34" fill="#00d4ff" opacity="0.08" filter="url(#strongGlow)"/>
    <!-- Right eye iris -->
    <circle cx="312" cy="210" r="26" fill="url(#eyeGrad)" filter="url(#softGlow)"/>
    <!-- Right eye inner ring -->
    <circle cx="312" cy="210" r="20" fill="none" stroke="rgba(0,212,255,0.4)" stroke-width="1"/>
    <circle cx="312" cy="210" r="14" fill="#050d1a"/>
    <!-- Right pupil glow -->
    <circle cx="312" cy="210" r="10" fill="#00d4ff" opacity="0.15"/>
    <circle cx="312" cy="210" r="6" fill="#00d4ff" opacity="0.4"/>
    <!-- Right eye catchlight -->
    <circle cx="304" cy="202" r="5" fill="white" opacity="0.75"/>
    <circle cx="319" cy="218" r="2.5" fill="white" opacity="0.25"/>

    <!-- ── NOSE BRIDGE ── -->
    <path d="M256 228 L244 262 Q256 272 268 262 Z" fill="none" stroke="rgba(0,212,255,0.25)" stroke-width="2" stroke-linejoin="round"/>

    <!-- ── MOUTH ── -->
    <!-- Mouth glow -->
    <path d="M210 292 Q256 320 302 292" fill="none" stroke="#00d4ff" stroke-width="8" stroke-linecap="round" opacity="0.08" filter="url(#strongGlow)"/>
    <!-- Mouth main -->
    <path d="M215 290 Q256 316 297 290" fill="none" stroke="url(#ringGrad)" stroke-width="3" stroke-linecap="round"/>
    <!-- Mouth highlight -->
    <path d="M226 290 Q256 308 286 290" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5" stroke-linecap="round"/>

    <!-- ── CHEEK CIRCUIT ── -->
    <g opacity="0.35" stroke="#00d4ff" stroke-width="1" fill="none">
      <rect x="130" y="240" width="28" height="14" rx="3"/>
      <line x1="158" y1="247" x2="170" y2="247"/>
      <circle cx="172" cy="247" r="2" fill="#00d4ff"/>
      <rect x="354" y="240" width="28" height="14" rx="3"/>
      <line x1="342" y1="247" x2="354" y2="247"/>
      <circle cx="340" cy="247" r="2" fill="#00d4ff"/>
    </g>

    <!-- ── BOTTOM PANEL ── -->
    <!-- Panel base -->
    <rect x="111" y="348" width="290" height="48" rx="8" fill="rgba(0,20,40,0.8)" stroke="rgba(0,212,255,0.2)" stroke-width="1"/>
    <!-- Panel scan lines -->
    <rect x="111" y="358" width="290" height="1" fill="rgba(0,212,255,0.06)"/>
    <rect x="111" y="368" width="290" height="1" fill="rgba(0,212,255,0.04)"/>
    <rect x="111" y="378" width="290" height="1" fill="rgba(0,212,255,0.06)"/>

    <!-- TEXT: AI ALEX -->
    <text x="256" y="383" font-family="'Courier New', monospace" font-size="22" font-weight="bold"
          fill="none" stroke="url(#ringGrad)" stroke-width="0.5"
          text-anchor="middle" letter-spacing="8" filter="url(#softGlow)">AI ALEX</text>
    <text x="256" y="383" font-family="'Courier New', monospace" font-size="22" font-weight="bold"
          fill="url(#ringGrad)"
          text-anchor="middle" letter-spacing="8">AI ALEX</text>

    <!-- ── STATUS DOTS ── -->
    <g filter="url(#softGlow)">
      <circle cx="146" cy="420" r="5" fill="#00ff88"/>
      <circle cx="164" cy="420" r="5" fill="#00d4ff"/>
      <circle cx="182" cy="420" r="5" fill="#7b2fff"/>
    </g>
    <text x="256" y="425" font-family="'Courier New', monospace" font-size="10"
          fill="rgba(0,212,255,0.5)" text-anchor="middle" letter-spacing="4">PERSONAL ASSISTANT</text>

    <!-- ── CORNER BRACKETS ── -->
    <g stroke="rgba(0,212,255,0.5)" stroke-width="2" fill="none" filter="url(#softGlow)">
      <!-- TL -->
      <polyline points="111,165 111,145 131,145"/>
      <!-- TR -->
      <polyline points="401,165 401,145 381,145"/>
      <!-- BL -->
      <polyline points="111,388 111,408 131,408"/>
      <!-- BR -->
      <polyline points="401,388 401,408 381,408"/>
    </g>

    <!-- Subtle vignette overlay -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="60%" stop-color="transparent"/>
      <stop offset="100%" stop-color="rgba(5,10,20,0.5)"/>
    </radialGradient>
    <rect width="512" height="512" fill="url(#vignette)"/>
  </g>
</svg>
